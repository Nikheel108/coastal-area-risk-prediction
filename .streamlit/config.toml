[theme]
primaryColor = "#0284C7"
backgroundColor = "#FFFFFF"
secondaryBackgroundColor = "#F1F5F9"
textColor = "#0F172A"
font = "sans serif"

[client]
showErrorDetails = true
toolbarMode = "minimal"

[server]
maxUploadSize = 200
headless = true
enableXsrfProtection = false
port = 8501

[logger]
level = "info"

[browser]
gatherUsageStats = false
